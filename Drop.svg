<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 254 254" width="254" height="254">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Dark Space Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="60%" stop-color="#020c1b"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>

    <!-- Core Fluid Flow Gradient -->
    <linearGradient id="dropGrad" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#00b4d8" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#0077b6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#03045e" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Outer Glow/Resonance Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00b4d8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#03045e" stop-opacity="0"/>
    </linearGradient>

    <!-- Internal Light Wave 1 -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#64ffda" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0077b6" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft Blur for Holistic Resonance -->
    <filter id="holisticGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Deep Blur for Ambient Background Glow -->
    <filter id="ambientBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Base Canvas Background -->
  <rect width="254" height="254" rx="40" fill="url(#bgGrad)"/>

  <!-- Subtle Ambient Resonance Field -->
  <path d="M 127,35 C 175,105 210,145 210,180 A 83,83 0 1,1 44,180 C 44,145 79,105 127,35 Z" 
        fill="url(#glowGrad)" 
        filter="url(#ambientBlur)" 
        opacity="0.6"/>

  <!-- Ripple Rings (Unbound Adaptation / Paradigm Shifts) -->
  <circle cx="127" cy="180" r="65" fill="none" stroke="#64ffda" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4 8"/>
  <circle cx="127" cy="180" r="80" fill="none" stroke="#00b4d8" stroke-width="0.75" stroke-opacity="0.2"/>
  <circle cx="127" cy="180" r="95" fill="none" stroke="#0077b6" stroke-width="0.5" stroke-opacity="0.1" stroke-dasharray="15 5"/>

  <!-- Mathematical Intuition Network (Background Vector Lines) -->
  <g opacity="0.15" stroke="#64ffda" stroke-width="0.5" fill="none">
    <line x1="127" y1="35" x2="127" y2="235"/>
    <line x1="27" y1="180" x2="227" y2="180"/>
    <path d="M 60,115 Q 127,150 194,115"/>
    <path d="M 75,80 Q 127,120 179,80"/>
    <path d="M 47,150 Q 127,175 207,150"/>
  </g>

  <!-- The Core Fluid Vessel (The Water Drop) -->
  <!-- Shape geometry shifting from rigid coordinates to organic curves -->
  <path d="M 127,38 C 170,102 202,142 202,175 A 75,75 0 1,1 52,175 C 52,142 84,102 127,38 Z" 
        fill="url(#dropGrad)" 
        filter="url(#holisticGlow)"/>

  <!-- Continuous Flow: Internal Dynamic Wave Ripples -->
  <!-- Wave 1: The High-Light Crest -->
  <path d="M 127,42 C 165,102 195,140 195,172 A 68,68 0 0,1 68,210 C 85,180 110,130 127,42 Z" 
        fill="url(#waveGrad1)"/>

  <!-- Wave 2: The Adaptive Inner Stream -->
  <path d="M 127,65 C 150,115 175,145 175,170 A 48,48 0 0,1 79,170 C 79,145 104,115 127,65 Z" 
        fill="none" 
        stroke="#64ffda" 
        stroke-width="1.5" 
        stroke-opacity="0.4"
        stroke-dasharray="120 30 40 10"/>

  <!-- Path of Least Resistance: Fluid Velocity Core -->
  <path d="M 127,85 C 140,120 155,140 155,165 A 28,28 0 0,1 99,165 C 99,140 114,120 127,85 Z" 
        fill="#0a192f" 
        opacity="0.3"/>

  <!-- Intuitive Consciousness Spark (Source Highlight) -->
  <ellipse cx="105" cy="130" rx="7" ry="18" 
           transform="rotate(-22, 105, 130)" 
           fill="#ffffff" 
           opacity="0.5" 
           filter="url(#holisticGlow)"/>
  
  <circle cx="98" cy="112" r="3" fill="#ffffff" opacity="0.6"/>
</svg>
